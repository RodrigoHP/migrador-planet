<!DOCTYPE html>
<html lang="pt-br">

<head>
  <title>Carta de Cancelamento por inadimplência</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="css/style.css" rel="stylesheet" type="text/css" />
  <link href="css/fonts.css" rel="stylesheet" type="text/css" />
  <script src="../Bibliotecas/js/knockout-3.4.2.js"></script>
  <script src="../Bibliotecas/js/knockout.mapping.js"></script>
</head>

<body data-bind="with: CartaCancelamento">

  <!-- Seção: sumário -->
  <div class="page">
    <div class="content">
      <div class="header">
        <div class="logo">
          <img src="./img/logoMagSeguros.png" height="53.088" width="107.1936" alt="Logo Mongeral" />
          <img src="./img/logoMongeralAegonColorido.png" height="17.5679" width="134.688" alt="Logo Mongeral" />
        </div>
      </div>
      <div class="subheader1">
        <div class="boxes">
          <div class="box">
            <div data-bind="html: 'Rio de Janeiro, ' + DiaAtual + ' de ' + MesAtual + ' de ' + AnoAtual+'<br></br>'">
            </div>
          </div>
        </div>
        <div class="boxes">
          <div class="box">
            <div data-bind="html: '<strong>CPF: </strong>' + CPF"></div>
          </div>
        </div>
        <div class="boxes">
          <div class="box">
            <div data-bind="html: '<strong>Nome Completo: </strong>' + NomeClienteCompleto"></div>
          </div>
        </div>
      </div>
      <div class="textoInicialCartaCancelamento">
        <div class="boxes">
          <div class="box2">
            <div
              data-bind="html: ' Sabemos que você prioriza a proteção da sua família, mas às vezes imprevistos acontecem. Após o nosso fechamento do mês, não identificamos o pagamento dos seus planos.'">
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="footer">
      <div>www.mag.com.br</div>
    </div>
  </div>
  <script>
    var data = ##TEMPLATE_DATA##;
  </script>
  <script src="js/base.js"></script>
</body>

</html>
